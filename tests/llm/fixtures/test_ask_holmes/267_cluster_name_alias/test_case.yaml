# Test: User asks about the LOCAL cluster but by an alias / shortened / casual
# name that doesn't exactly match cluster_name.
#
# Holmes is on cluster_name="acme-prod-eu-west-1" but the user just says
# "EU prod" / "prod-eu" / "the EU production environment". This is the SAME
# cluster, just referenced informally. Holmes must recognise the equivalence
# and answer normally — NOT flag a cluster mismatch and refuse to investigate.
#
# Counter-test to 259/264: cluster-awareness must be smart enough to recognise
# common aliases for the local cluster rather than over-flagging.

user_prompt: |
  EU prod is having a checkout incident — 500s on POST /api/checkout. Investigate
  using the app-267-prod-logs index.

cluster_name: "acme-prod-eu-west-1"

include_tool_calls: true

expected_output:
  - "Must recognise that 'EU prod' is a casual reference to the local cluster acme-prod-eu-west-1 (region eu-west-1, environment prod) and investigate the incident normally"
  - "Must NOT refuse / flag a cluster mismatch — 'EU prod' is the same cluster as acme-prod-eu-west-1, just by a casual name"
  - "Must identify the root cause from the index: payment-service upstream timeouts to adyen-eu, which triggered the checkout-service circuit-breaker"

tags:
  - elasticsearch
  - medium
  - transparency
  - multi-cluster

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  LOGS_INDEX="app-267-prod-logs"

  ts() { python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta($1)).strftime('%Y-%m-%dT%H:%M:%SZ'))"; }
  T_30M=$(ts "minutes=30")
  T_1H=$(ts "hours=1")
  T_2H=$(ts "hours=2")

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${LOGS_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  curl -sf -X PUT "${ELASTICSEARCH_URL}/${LOGS_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"settings":{"number_of_shards":1,"number_of_replicas":0},"mappings":{"properties":{"timestamp":{"type":"date"},"service":{"type":"keyword"},"cluster":{"type":"keyword"},"region":{"type":"keyword"},"environment":{"type":"keyword"},"level":{"type":"keyword"},"message":{"type":"text"}}}}' > /dev/null

  # All data is from acme-prod-eu-west-1 — the cluster Holmes is on.
  # The user calling it "EU prod" is just a casual alias.
  BULK_FILE=$(es_temp_file "logs" "267")
  cat > "$BULK_FILE" << BULK_EOF
  {"index":{}}
  {"timestamp":"${T_2H}","service":"checkout-service","cluster":"acme-prod-eu-west-1","region":"eu-west-1","environment":"prod","level":"ERROR","message":"POST /api/checkout failed: payment provider response timeout after 30s (adyen-eu)"}
  {"index":{}}
  {"timestamp":"${T_2H}","service":"payment-service","cluster":"acme-prod-eu-west-1","region":"eu-west-1","environment":"prod","level":"ERROR","message":"Upstream timeout calling adyen-eu /v68/payments after 30000ms"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"checkout-service","cluster":"acme-prod-eu-west-1","region":"eu-west-1","environment":"prod","level":"ERROR","message":"Circuit-breaker open for payment-service (failure rate 36%)"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"payment-service","cluster":"acme-prod-eu-west-1","region":"eu-west-1","environment":"prod","level":"WARN","message":"adyen-eu degraded mode acknowledged via status page; retry queue depth=620"}
  BULK_EOF
  sed 's/^  //' "$BULK_FILE" > "${BULK_FILE}.tmp" && mv "${BULK_FILE}.tmp" "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null
  echo "Test data: acme-prod-eu-west-1 incident logs (the user's 'EU prod')"

after_test: |
  echo "Skipping index cleanup (reentrant)"
