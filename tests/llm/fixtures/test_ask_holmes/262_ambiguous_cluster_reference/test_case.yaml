# Test: Ambiguous cluster reference.
# cluster_name is the generic "production"; user asks about "the US prod cluster".
# The ES index contains data for production-us-east-1 AND production-eu-west-1.
# Holmes must not silently assume the user means "production" (its local context)
# — it must either clarify or explicitly pick "production-us-east-1" and label
# the choice. Investigating "production" (the local one) and presenting its data
# as the answer is a fail.

user_prompt: |
  Our US prod cluster is having a checkout incident — investigate using
  app-262-prod-logs.

cluster_name: "production"

include_tool_calls: true

expected_output:
  - "Must NOT silently treat the local cluster_name 'production' as the cluster the user named ('the US prod cluster') — those are different references"
  - "Must EITHER ask the user to clarify which cluster (e.g. production-us-east-1 vs production / production-eu-west-1), OR explicitly investigate the production-us-east-1 data from the index and label findings as belonging to production-us-east-1"
  - "If Holmes does investigate, findings must be labeled with their cluster of origin (production-us-east-1); must not present production-eu-west-1 data as the answer"

tags:
  - elasticsearch
  - medium
  - transparency
  - multi-cluster

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  LOGS_INDEX="app-262-prod-logs"

  ts() { python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta($1)).strftime('%Y-%m-%dT%H:%M:%SZ'))"; }
  T_30M=$(ts "minutes=30")
  T_1H=$(ts "hours=1")
  T_2H=$(ts "hours=2")

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${LOGS_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  curl -sf -X PUT "${ELASTICSEARCH_URL}/${LOGS_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"settings":{"number_of_shards":1,"number_of_replicas":0},"mappings":{"properties":{"timestamp":{"type":"date"},"service":{"type":"keyword"},"cluster":{"type":"keyword"},"level":{"type":"keyword"},"message":{"type":"text"}}}}' > /dev/null

  BULK_FILE=$(es_temp_file "logs" "262")
  cat > "$BULK_FILE" << BULK_EOF
  {"index":{}}
  {"timestamp":"${T_2H}","service":"checkout-service","cluster":"production-us-east-1","level":"ERROR","message":"POST /api/checkout failed: payment provider response timeout after 30s (Stripe-US)"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"payment-service","cluster":"production-us-east-1","level":"ERROR","message":"Upstream timeout calling stripe-us /v1/charges after 30000ms"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"checkout-service","cluster":"production-us-east-1","level":"ERROR","message":"Circuit-breaker open for payment-service (failure rate 44%)"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"checkout-service","cluster":"production-eu-west-1","level":"INFO","message":"Healthy: p95 latency 230ms"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"checkout-service","cluster":"production-eu-west-1","level":"INFO","message":"Healthy: success rate 99.7%"}
  BULK_EOF
  sed 's/^  //' "$BULK_FILE" > "${BULK_FILE}.tmp" && mv "${BULK_FILE}.tmp" "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null
  echo "Test data ready: production-us-east-1 (incident) + production-eu-west-1 (healthy)"

after_test: |
  echo "Skipping index cleanup (reentrant)"
