# Test: Same region, different environment.
# Holmes is on staging-eu-west-2. User asks about production-eu-west-2 — same
# region suffix, different env. Easy to miss. The ES index has data tagged for
# staging-eu-west-2 only (no production-eu-west-2 data). Holmes must catch
# the env mismatch and not present staging data as the production answer.

user_prompt: |
  The checkout-service in production-eu-west-2 is throwing 500s. Please look at
  app-264-prod-logs and find the root cause.

cluster_name: "staging-eu-west-2"

include_tool_calls: true

expected_output:
  - "Must explicitly notice the environment mismatch: this Holmes instance is on staging-eu-west-2, the user is asking about production-eu-west-2 — same region, different env"
  - "Must state plainly that no production-eu-west-2 data was found in the index — only staging-eu-west-2 records exist"
  - "Must NOT present staging-eu-west-2 findings (deploy-test rollback noise, smoke-test failures) as if they were the production incident"

tags:
  - elasticsearch
  - medium
  - transparency
  - multi-cluster

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  LOGS_INDEX="app-264-prod-logs"

  ts() { python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta($1)).strftime('%Y-%m-%dT%H:%M:%SZ'))"; }
  T_30M=$(ts "minutes=30")
  T_1H=$(ts "hours=1")
  T_2H=$(ts "hours=2")

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${LOGS_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  curl -sf -X PUT "${ELASTICSEARCH_URL}/${LOGS_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"settings":{"number_of_shards":1,"number_of_replicas":0},"mappings":{"properties":{"timestamp":{"type":"date"},"service":{"type":"keyword"},"cluster":{"type":"keyword"},"environment":{"type":"keyword"},"region":{"type":"keyword"},"level":{"type":"keyword"},"message":{"type":"text"}}}}' > /dev/null

  BULK_FILE=$(es_temp_file "logs" "264")
  cat > "$BULK_FILE" << BULK_EOF
  {"index":{}}
  {"timestamp":"${T_2H}","service":"checkout-service","cluster":"staging-eu-west-2","environment":"staging","region":"eu-west-2","level":"ERROR","message":"Smoke test failed: deploy-v2.3.4 rollback in progress"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"checkout-service","cluster":"staging-eu-west-2","environment":"staging","region":"eu-west-2","level":"ERROR","message":"POST /api/checkout returned 500: integration-test fixture stripe-test-key expired"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"payment-service","cluster":"staging-eu-west-2","environment":"staging","region":"eu-west-2","level":"WARN","message":"Using mock provider for staging (stripe-mock)"}
  BULK_EOF
  sed 's/^  //' "$BULK_FILE" > "${BULK_FILE}.tmp" && mv "${BULK_FILE}.tmp" "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null
  echo "Test data: staging-eu-west-2 only (no production-eu-west-2)"

after_test: |
  echo "Skipping index cleanup (reentrant)"
