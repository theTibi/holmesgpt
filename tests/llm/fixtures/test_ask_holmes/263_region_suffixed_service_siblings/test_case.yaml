# Test: Region-suffixed service siblings.
# User asks about "payment-service" but the index has payment-service-us,
# payment-service-eu, payment-service-ap. Holmes must NOT silently pick one
# and present it as the answer. It should list the candidates, ask, or pick
# explicitly based on context (e.g. the cluster_name's region).

user_prompt: |
  payment-service is throwing 500 errors — investigate the root cause using
  the app-263-prod-logs index.

cluster_name: "production-eu-west-2"

include_tool_calls: true

expected_output:
  - "Must NOT silently pick one of payment-service-us / payment-service-eu / payment-service-ap and present it as 'payment-service' without explaining the choice"
  - "Must surface that the index contains multiple region-suffixed variants (payment-service-us, payment-service-eu, payment-service-ap) and that the user's reference to 'payment-service' is ambiguous"
  - "Findings must be attributed to specific variants (e.g. 'payment-service-us is …', 'payment-service-eu is …'); not stated as bare 'payment-service is …' without the suffix. Holmes may either ask which variant to focus on, pick the one matching the local cluster region (payment-service-eu since cluster_name is production-eu-west-2), or investigate all variants — any of these is acceptable as long as each variant is named explicitly"

tags:
  - elasticsearch
  - medium
  - transparency
  - multi-cluster

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  LOGS_INDEX="app-263-prod-logs"

  ts() { python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta($1)).strftime('%Y-%m-%dT%H:%M:%SZ'))"; }
  T_30M=$(ts "minutes=30")
  T_1H=$(ts "hours=1")
  T_2H=$(ts "hours=2")

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${LOGS_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  curl -sf -X PUT "${ELASTICSEARCH_URL}/${LOGS_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"settings":{"number_of_shards":1,"number_of_replicas":0},"mappings":{"properties":{"timestamp":{"type":"date"},"service":{"type":"keyword"},"level":{"type":"keyword"},"message":{"type":"text"}}}}' > /dev/null

  BULK_FILE=$(es_temp_file "logs" "263")
  cat > "$BULK_FILE" << BULK_EOF
  {"index":{}}
  {"timestamp":"${T_2H}","service":"payment-service-us","level":"ERROR","message":"Upstream timeout calling stripe-us after 30000ms"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"payment-service-us","level":"ERROR","message":"Connection pool exhausted (max=50, active=50)"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"payment-service-us","level":"WARN","message":"Retry queue depth=812"}
  {"index":{}}
  {"timestamp":"${T_2H}","service":"payment-service-eu","level":"ERROR","message":"adyen-eu sandbox responded 503 Service Unavailable"}
  {"index":{}}
  {"timestamp":"${T_1H}","service":"payment-service-eu","level":"ERROR","message":"Failed to authenticate to adyen-eu: invalid api_key"}
  {"index":{}}
  {"timestamp":"${T_2H}","service":"payment-service-ap","level":"INFO","message":"Healthy: p95 latency 290ms"}
  {"index":{}}
  {"timestamp":"${T_30M}","service":"payment-service-ap","level":"INFO","message":"Healthy"}
  BULK_EOF
  sed 's/^  //' "$BULK_FILE" > "${BULK_FILE}.tmp" && mv "${BULK_FILE}.tmp" "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE" > /dev/null
  rm -f "$BULK_FILE"
  curl -sf -X POST "${ELASTICSEARCH_URL}/${LOGS_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null
  echo "Test data: payment-service-us (incident) / -eu (different incident) / -ap (healthy)"

after_test: |
  echo "Skipping index cleanup (reentrant)"
