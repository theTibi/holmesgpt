# Datadog toolset is INTENTIONALLY disabled (mimics "customer hasn't configured
# this integration yet") to verify Holmes distinguishes "I can't access this"
# from "I searched and found nothing".
toolsets:
  elasticsearch/data:
    enabled: true
    config:
      api_url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true
  elasticsearch/cluster:
    enabled: true
    config:
      api_url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true
  datadog/metrics:
    enabled: false
  datadog/logs:
    enabled: false
  datadog/traces:
    enabled: false
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
  robusta:
    enabled: false
  bash:
    enabled: false
